<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Seasons Care Services{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/base.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/recipes" class="nav-brand">Seasons</a>
            <div class="nav-links">
                <a href="/recipes" class="nav-link">Recipes</a>
                <a href="/plans" class="nav-link">Meal Plans</a>
                <a href="/shopping" class="nav-link">Shopping</a>
                <a href="/clients" class="nav-link">Clients</a>
            </div>
            <div class="nav-user">
                <button class="nav-user-btn" onclick="this.parentElement.classList.toggle('open')" aria-label="User menu">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </button>
                <div class="nav-dropdown">
                    <a href="/admin" class="dropdown-item">Admin</a>
                    <a href="/logout" class="dropdown-item">Sign Out</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        Seasons Care Services &bull; Julie Brown &bull; Pocatello, Idaho
    </footer>

    <script>
        document.addEventListener('click', function(e) {
            document.querySelectorAll('.nav-user.open').forEach(function(el) {
                if (!el.contains(e.target)) el.classList.remove('open');
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
